version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: Y
    ports:
      - "1433:1433"
    networks:
      - ecom-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ecom-network

  gateway:
    build: ./gateway/Ecom.Gateway
    ports:
      - "5000:80"
    depends_on:
      - auth
      - catalog
      - workflow
      - reporting
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    networks:
      - ecom-network

  auth:
    build: ./services/auth/Ecom.Auth
    ports:
      - "5001:80"
    environment:
      ConnectionStrings__AuthDb: ${AUTH_DB_CONN}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      RabbitMq__Host: rabbitmq
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - ecom-network

  catalog:
    build: ./services/catalog/Ecom.Catalog
    ports:
      - "5002:80"
    environment:
      ConnectionStrings__CatalogDb: ${CATALOG_DB_CONN}
      RabbitMq__Host: rabbitmq
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - ecom-network

  workflow:
    build: ./services/workflow/Ecom.Workflow
    ports:
      - "5003:80"
    environment:
      ConnectionStrings__WorkflowDb: ${WORKFLOW_DB_CONN}
      RabbitMq__Host: rabbitmq
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - ecom-network

  reporting:
    build: ./services/reporting/Ecom.Reporting
    ports:
      - "5004:80"
    environment:
      ConnectionStrings__ReportingDb: ${REPORTING_DB_CONN}
      RabbitMq__Host: rabbitmq
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - ecom-network

networks:
  ecom-network:
    driver: bridge
